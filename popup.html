<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: monospace;
      padding: 16px;
    }
    h1 {
      font-size: 13px;
      color: #4a9eff;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }
    label { color: #888; font-size: 11px; display: block; margin-bottom: 4px; }
    input[type="number"] {
      width: 100%;
      background: #1e1e2e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #3a8eef; }
    .saved {
      text-align: center;
      color: #4ade80;
      font-size: 11px;
      margin-top: 8px;
      display: none;
    }
    .divider {
      border: none;
      border-top: 1px solid #333;
      margin: 14px 0;
    }
    .note {
      font-size: 10px;
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>⚡ GENSPARK TOKEN MONITOR</h1>

  <label>トークン上限値（目安）</label>
  <input type="number" id="limitInput" value="100000" min="1000" step="1000">

  <button id="saveBtn">保存</button>
  <div class="saved" id="savedMsg">✓ 保存しました</div>

  <hr class="divider">

  <div class="note">
    ・Input / Output トークンを個別に推定<br>
    ・日本語：約1文字 = 1トークン<br>
    ・英語：約4文字 = 1トークン<br>
    ・80%超 → 黄色警告<br>
    ・95%超 → 赤色アラート<br>
    ・実測値ではなく推定値です
  </div>

  <script src="popup.js"></script>
</body>
</html>
